<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple HTML Table</title>
    <style>
        /* Adds clean, single-line borders and padding */
        table {
            border-collapse: collapse;
            width: 100%;
        }
        th, td {
            border: 1px solid #dddddd;
            text-align: left;
            padding: 8px;
        }
        /* Optional: Gives headers a background color */
        th {
            background-color: #f2f2f2;
        }
    </style>
</head>
<body>

    <table>
        <!-- Table Header Row -->
        <tr>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Age</th>
        </tr>
        <!-- Data Row 1 -->
        <tr>
            <td>John</td>
            <td>Doe</td>
            <td>28</td>
        </tr>
        <!-- Data Row 2 -->
        <tr>
            <td>Jane</td>
            <td>Smith</td>
            <td>32</td>
        </tr>
    </table>

</body>
</html>
